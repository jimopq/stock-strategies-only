name: V3 Daily Signal

on:
  schedule:
    # Taiwan time 14:30 = UTC 06:30, after market close.
    - cron: "30 6 * * 1-5"
  workflow_dispatch:

# 部署靜態儀表板到 GitHub Pages 所需
permissions:
  contents: read
  pages: write
  id-token: write

# 同時只跑一次部署，但不取消進行中的（訊號跑到一半被砍掉沒意義）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  run-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"

      - name: Install deps
        run: uv sync

      - name: Run signal engine
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BROADCAST_IDS: ${{ secrets.TELEGRAM_BROADCAST_IDS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: uv run python main.py

      # 接在訊號引擎之後跑，此時 parquet 快取是熱的，
      # 讀價格畫 K 線不需要再打 FinMind
      - name: Build dashboard
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: uv run python -m dashboard.build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
