name: V3 Daily Signal

on:
  schedule:
    # Taiwan time 14:30 = UTC 06:30, after market close.
    - cron: "30 6 * * 1-5"
  workflow_dispatch:
    inputs:
      limit:
        description: "只掃前 N 檔（測試部署流程用，留空=掃全部）"
        required: false
        default: ""

jobs:
  run-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"

      - name: Install deps
        run: uv sync

      - name: Run signal engine
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BROADCAST_IDS: ${{ secrets.TELEGRAM_BROADCAST_IDS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "${{ inputs.limit }}" ]; then
            uv run python main.py --limit "${{ inputs.limit }}"
          else
            uv run python main.py
          fi

      # 接在訊號引擎之後跑，此時 parquet 快取是熱的，
      # 讀價格畫 K 線不需要再打 FinMind。
      # 建置最後會掃描輸出確認無憑證外洩，命中則中止。
      - name: Build dashboard
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: uv run python -m dashboard.build

      # 部署到 Cloudflare Pages（前面掛 Cloudflare Access 做登入驗證）。
      # 尚未設定 Cloudflare 時自動略過，不讓排程失敗。
      - name: Check Cloudflare config
        id: cf
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] && \
             [ -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::未設定 Cloudflare secrets，略過儀表板部署"
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.cf.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # ⚠️ 這裡要填「專案名稱」，不是網址的子網域——兩者可能不同。
          # 子網域是全域唯一，被佔用時 Cloudflare 只會在子網域加後綴
          # （本例網址是 stock-dashboard-cij.pages.dev），專案名稱仍是原本的。
          # 用 API 確認：GET /accounts/{id}/pages/projects
          command: >-
            pages deploy dist
            --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME || 'stock-dashboard' }}
            --branch=main
